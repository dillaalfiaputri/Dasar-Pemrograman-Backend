<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Barang</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Edit Barang</h1>
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="kode">Kode Barang:</label>
                <input type="text"
                        id="kode"
                        name="kode"
                        class="form-control"
                        value="{{ item['kode'] }}"
                        readonly>

            </div>
            <div class="form-group">
                <label for="nama">Nama Barang:</label>
                <input type="text" id="nama" name="nama" class="form-control" value="{{ item['nama'] }}" required>
            </div>
            <div class="form-group">
                <label for="harga">Harga Barang:</label>
                <input type="number" id="harga" name="harga" class="form-control" value="{{ item['harga'] }}" required>
            </div>
            <div class="form-group">
                <label for="jumlah">Jumlah Stok:</label>
                <input type="number" id="jumlah" name="jumlah" class="form-control" value="{{ item['jumlah'] }}" required>
            </div>
            <div class="form-group">
                <label>Terjual</label>
                <input type="number"
                    name="terjual"
                    class="form-control"
                    value="{{ item['terjual'] }}"
                    required>
                </div>

            <div class="mb-3">
                <label>Kategori</label>
                <input type="text"
                        name="kategori"
                        class="form-control"
                        value="{{ item['kategori'] }}"
                        required>

                </div>
                <div class="form-group">
                    <label>PT (Produsen)</label>
                    <input type="text"
                        name="pt"
                        class="form-control"
                        value="{{ item['pt'] }}"
                        required>
                </div>
                <div class="form-group">
    <label for="deskripsi">Deskripsi Produk</label>
    <textarea
        name="deskripsi"
        id="deskripsi"
        class="form-control"
        rows="4"
        required>{{ item['deskripsi'] }}</textarea>
</div>

            <div class="form-group">
                <label for="foto">Foto Barang:</label>
                {% if item['foto'] %}
                <div class="mb-2">
                    <img src="/uploads/{{ item.foto }}"
                        alt="Foto"
                        style="width: 100px; height: 100px; object-fit: cover;">

                    <p class="text-muted small">Foto saat ini</p>
                </div>
                {% endif %}
                <input type="file" id="foto" name="foto" class="form-control-file" accept="image/*">
                <small class="form-text text-muted">Format: JPG, JPEG, PNG, GIF (Kosongkan jika tidak ingin mengubah foto)</small>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-warning">Update Data</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary ml-2">Kembali</a>
            </div>
        </form>
    </div>
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
